<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>➕</text></svg>">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div id="main">
        <div id="calculator-body">
            
            <span class="title">Casio 991ex</span>
            <div id="display">
            </div>

            <div id="button-container">
                <button class="buttons" data-value="">7</button>
                <button class="buttons" data-value="">8</button>
                <button class="buttons" data-value="">9</button>
                <button class="buttons" data-value="">C</button>
                <button class="buttons" data-value="">AC</button>
                <button class="buttons" data-value="">4</button>
                <button class="buttons" data-value="">5</button>
                <button class="buttons" data-value="">6</button>
                <button class="buttons" data-value="">+</button>
                <button class="buttons" data-value="">-</button>
                <button class="buttons" data-value="">1</button>
                <button class="buttons" data-value="">2</button>
                <button class="buttons" data-value="">3</button>
                <button class="buttons" data-value="">*</button>
                <button class="buttons" data-value="">/</button>
                <button class="buttons" data-value="">0</button>
                <button class="buttons" data-value="">.</button>
                <button class="buttons" data-value="">=</button>
            </div>   

        </div>
    </div>
    <footer>
        <p>Copywrite © Devansh-pipraiya</p>
        <a href="https://github.com/Devansh-pipraiya" target="_blank">
            <img class="github-logo" src="https://octicons.andre601.ch/mark-github"/>
        </a>
    </footer>
</body>
</html>
